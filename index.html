<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fly-plane</title>
  <style>
    /* ── Reset & base ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    /* ── Canvas fills viewport ───────────────────────── */
    #canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* ── HUD overlay ─────────────────────────────────── */
    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      color: #00ffcc;
      text-shadow: 0 0 8px #00ffcc88;
      user-select: none;
    }

    /* Top-left info panel */
    #panel-tl {
      position: absolute;
      top: 22px;
      left: 22px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .hud-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(0, 12, 24, 0.55);
      border: 1px solid #00ffcc44;
      border-radius: 4px;
      padding: 5px 12px;
      font-size: 13px;
      letter-spacing: 0.08em;
      backdrop-filter: blur(4px);
    }

    .hud-label {
      color: #00ffcc66;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .hud-value {
      color: #00ffee;
      font-size: 16px;
      font-weight: bold;
      min-width: 70px;
    }

    /* Throttle bar – right side */
    #throttle-panel {
      position: absolute;
      top: 22px;
      right: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .throttle-label {
      font-size: 10px;
      letter-spacing: 0.15em;
      color: #00ffcc66;
      text-transform: uppercase;
    }

    #throttle-track {
      width: 18px;
      height: 120px;
      background: rgba(0, 12, 24, 0.55);
      border: 1px solid #00ffcc44;
      border-radius: 4px;
      display: flex;
      align-items: flex-end;
      overflow: hidden;
      backdrop-filter: blur(4px);
    }

    #throttle-fill {
      width: 100%;
      height: 50%;
      background: linear-gradient(to top, #00ffcc, #00ff8866);
      transition: height 0.1s ease;
      box-shadow: 0 0 8px #00ffcc88;
    }

    /* Crosshair */
    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 32px;
      height: 32px;
    }

    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: #00ffcc;
      opacity: 0.6;
      border-radius: 2px;
    }
    #crosshair::before {
      left: 50%; top: 0;
      width: 1.5px; height: 100%;
      transform: translateX(-50%);
    }
    #crosshair::after {
      top: 50%; left: 0;
      height: 1.5px; width: 100%;
      transform: translateY(-50%);
    }

    .ch-ring {
      position: absolute;
      inset: 0;
      border: 1.5px solid #00ffcc66;
      border-radius: 50%;
    }

    /* Heading compass – bottom-center */
    #compass {
      position: absolute;
      bottom: 52px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(0, 12, 24, 0.55);
      border: 1px solid #00ffcc44;
      border-radius: 4px;
      padding: 5px 18px;
      font-size: 13px;
      backdrop-filter: blur(4px);
    }

    /* Input label – bottom-left */
    #input-label {
      position: absolute;
      bottom: 18px;
      left: 22px;
      background: rgba(0, 12, 24, 0.55);
      border: 1px solid #00ffcc44;
      border-radius: 4px;
      padding: 5px 12px;
      font-size: 11px;
      color: #00ffcc88;
      backdrop-filter: blur(4px);
      max-width: calc(100vw - 120px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Title badge */
    #title-badge {
      position: absolute;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #00ffcc55;
      text-shadow: none;
      white-space: nowrap;
    }

    /* Loading screen */
    #loading {
      position: fixed;
      inset: 0;
      background: #060c14;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 100;
      transition: opacity 0.8s ease;
    }

    #loading h1 {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(28px, 5vw, 52px);
      color: #00ffcc;
      letter-spacing: 0.25em;
      text-shadow: 0 0 30px #00ffcc88;
    }

    #loading p {
      font-family: 'Share Tech Mono', monospace;
      color: #00ffcc55;
      font-size: 13px;
      letter-spacing: 0.2em;
    }

    .loading-bar-track {
      width: 220px;
      height: 3px;
      background: #00ffcc22;
      border-radius: 2px;
      overflow: hidden;
    }

    .loading-bar-fill {
      height: 100%;
      background: #00ffcc;
      box-shadow: 0 0 8px #00ffccaa;
      animation: loadpulse 1s ease-in-out infinite;
    }

    @keyframes loadpulse {
      0%   { width: 0%; }
      50%  { width: 80%; }
      100% { width: 100%; }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- 3D canvas -->
  <canvas id="canvas"></canvas>

  <!-- HUD overlay -->
  <div id="hud">
    <div id="title-badge">FLY-PLANE · FLIGHT SIMULATOR</div>

    <!-- Top-left metrics -->
    <div id="panel-tl">
      <div class="hud-row">
        <span class="hud-label">Speed</span>
        <span class="hud-value" id="hud-speed">— km/h</span>
      </div>
      <div class="hud-row">
        <span class="hud-label">Alt</span>
        <span class="hud-value" id="hud-altitude">— m</span>
      </div>
    </div>

    <!-- Throttle bar – right -->
    <div id="throttle-panel">
      <div class="throttle-label">THR</div>
      <div id="throttle-track">
        <div id="throttle-fill"></div>
      </div>
    </div>

    <!-- Crosshair -->
    <div id="crosshair"><div class="ch-ring"></div></div>

    <!-- Heading compass – bottom-center -->
    <div id="compass">
      <span class="hud-label">HDG</span>
      <span class="hud-value" id="hud-heading">—°</span>
    </div>

    <!-- Input device label -->
    <div id="input-label" id="hud-input">Initialising…</div>
  </div>

  <!-- Loading screen -->
  <div id="loading">
    <h1>FLY-PLANE</h1>
    <p>LOADING FLIGHT SYSTEMS…</p>
    <div class="loading-bar-track">
      <div class="loading-bar-fill"></div>
    </div>
  </div>

  <script type="module">
    import { JoystickController } from './joystick.js';
    import { AirplaneGame }       from './game.js';

    // Gather HUD DOM references
    const hud = {
      speed:      document.getElementById('hud-speed'),
      altitude:   document.getElementById('hud-altitude'),
      heading:    document.getElementById('hud-heading'),
      throttle:   document.getElementById('throttle-fill'),
      inputLabel: document.getElementById('input-label'),
    };

    const canvas  = document.getElementById('canvas');
    const loading = document.getElementById('loading');

    // Small delay so Three.js has time to compile shaders
    setTimeout(() => {
      const joystick = new JoystickController();
      const game     = new AirplaneGame(canvas, hud, joystick);

      // Fade out loading screen
      loading.style.opacity = '0';
      setTimeout(() => loading.style.display = 'none', 820);
    }, 600);
  </script>
</body>
</html>
